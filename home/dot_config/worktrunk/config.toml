# worktrunk USER config — renders to ~/.config/worktrunk/config.toml
#
# This is the global/user config (list display, global aliases, worktree-path
# template, LLM-commit settings). NOT shared per-repo. Per-project hooks (dev
# server, db, lint/test gates) belong in each repo's OWN .config/wt.toml,
# committed inside that repo — not in dotfiles.
#
# NOT a chezmoi .tmpl: worktrunk uses {{ }} template syntax (e.g.
# {{ branch | hash_port }}) that collides with chezmoi's. Plain file = chezmoi
# copies it verbatim and worktrunk keeps its {{ }}.
#
# Template vars: {{ branch }} {{ args }} {{ env }} {{ default_branch }}
#                {{ worktree_path }} {{ repo }} {{ target }}
# Filters:       {{ branch | hash_port }}  {{ branch | sanitize }}

# Place worktrees inside the repo under .claude/worktrees/<branch>, matching the
# Claude Code EnterWorktree layout. .claude/ is globally gitignored
# (~/.config/git/ignore), so nested worktrees never show up as untracked.
# Default would be a sibling dir: {{ repo_path }}/../{{ repo }}.{{ branch | sanitize }}
worktree-path = "{{ repo_path }}/.claude/worktrees/{{ branch | sanitize }}"

[list]
# LLM-generated one-line branch summaries in `wt list`.
summary = true

[aliases]
# Universally safe — works in any git repo, no language assumptions.
since-main = "git log --oneline {{ default_branch }}..HEAD"

# LLM commit/squash messages + the branch summaries enabled by [list] summary.
# --safe-mode runs claude hermetically (no hooks/plugins/MCP/skills/CLAUDE.md),
# so session hooks and project settings can't pollute the generated text;
# --setting-sources='user' keeps auth out of a project .claude/settings.json.
[commit.generation]
command = "MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --safe-mode --setting-sources='user' --system-prompt=''"
