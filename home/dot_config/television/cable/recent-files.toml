[metadata]
name = "recent-files"
description = "Recently modified files (git changes + filesystem)"
requirements = ["bat"]

[source]
command = [
  "git diff --name-only HEAD~10 2>/dev/null",
  "fd --type f --changed-within 7d",
  "fd --type f --changed-within 1h",
]
no_sort = true
frecency = false

[preview]
command = "bat -n --color=always '{}'"

[keybindings]
enter = "actions:edit"

[actions.edit]
description = "Open in editor"
command = "${EDITOR:-nvim} '{}'"
shell = "bash"
mode = "execute"
