# Claude Code plugin marketplaces — single source of truth for the
# `claude plugin marketplace add` reconciler.
#
# Consumed by run_onchange_after_55-update-claude-marketplaces.{sh,ps1}.tmpl,
# which ensures each marketplace is registered (idempotent) and refreshes
# all known marketplaces.
#
# dot_claude/settings.json.tmpl renders extraKnownMarketplaces from this table.
#
# Format: <marketplace-short-name> = "<github-owner/repo>"
# The short name is what plugin references use (e.g. "caveman@caveman").

[marketplaces]
caveman                   = "JuliusBrussee/caveman"
"claude-brain-sync"       = "toroleapinc/claude-brain"
"claude-plugins-official" = "anthropics/claude-plugins-official"
"karpathy-skills"         = "forrestchang/andrej-karpathy-skills"
"obsidian-skills"         = "kepano/obsidian-skills"
qmd                       = "tobi/qmd"

# Plugin enablement — grouped by profile (machine class). See CONTEXT.md.
# Format: "<plugin-name>@<marketplace-name>" = <bool>
#   true  = enabled (Claude Code loads + activates)
#   false = installed-but-suppressed (preserves "considered and rejected" record)
# Profile = the section name. A plugin needed under multiple profiles must
# be listed in each (no multi-gate field; trade-off for tight readability).

[plugins.always]
"context7@claude-plugins-official"                 = true
"hookify@claude-plugins-official"                  = true
"claude-md-management@claude-plugins-official"     = true
"superpowers@claude-plugins-official"              = true
"claude-code-setup@claude-plugins-official"        = true
"security-guidance@claude-plugins-official"        = true
"explanatory-output-style@claude-plugins-official" = true
"learning-output-style@claude-plugins-official"    = true
"ralph-loop@claude-plugins-official"               = false

[plugins.personal]
"claude-brain-sync@claude-brain-sync" = true

[plugins.dev_computer]
"qmd@qmd"                                 = true
"code-review@claude-plugins-official"     = true
"feature-dev@claude-plugins-official"     = true
"typescript-lsp@claude-plugins-official"  = true
"commit-commands@claude-plugins-official" = true
"playwright@claude-plugins-official"      = true
"code-simplifier@claude-plugins-official" = true
"plugin-dev@claude-plugins-official"      = true
"caveman@caveman"                         = true
"obsidian@obsidian-skills"                = true
"greptile@claude-plugins-official"        = false
