# Agent skills installed via the `npx skills` CLI.
# Consumed by run_onchange_after_60-install-skills.sh.tmpl — when this
# file changes, the install script re-runs.
#
# Each entry: GitHub repo (owner/name) + the subset of skill names to
# install. Replaces the static $mattSkills list previously held in
# .chezmoiexternal.toml.tmpl, which went stale on upstream refactors.
skill_repos:
  - repo: mattpocock/skills
    # Hidden-subdir skills (misc/, personal/, deprecated/, in-progress/) are excluded from
    # `npx skills add mattpocock/skills -l` BUT can still be installed by
    # name via the --skill flag, which the reconciler script uses.
    #
    # Reconciled against upstream v1.0.0 (Jun 2026 "design skills" refactor):
    #   write-a-skill → writing-great-skills (replaced)
    #   diagnose      → diagnosing-bugs (renamed)
    #   zoom-out      → removed upstream, no replacement
    #
    # Reconciled against upstream v1.1.0 (Jul 2026):
    #   to-issues, to-prd → unified upstream into to-spec + to-tickets
    #   wayfinder         → graduated in-progress/ to engineering/ (now stable)
    # Stale on-disk dirs purged via .chezmoiremove.tmpl.
    skills:
      # productivity/
      - grill-me
      - grilling
      - writing-great-skills
      - teach
      - handoff
      # engineering/
      - diagnosing-bugs
      - grill-with-docs
      - improve-codebase-architecture
      - codebase-design
      - domain-modeling
      - resolving-merge-conflicts
      - ask-matt
      - prototype
      - implement
      - setup-matt-pocock-skills
      - tdd
      - to-spec
      - to-tickets
      - triage
      - code-review
      - research
      - wayfinder
      # misc/ (hidden but installable by name)
      - git-guardrails-claude-code
      - migrate-to-shoehorn
      - scaffold-exercises
      # in-progress/ (unstable upstream; may rename/break — installable by name)
      - wizard
      - loop-me
      - writing-fragments
      - writing-beats
      - writing-shape
      - claude-handoff
  - repo: vercel-labs/skills
    skills:
      - find-skills
  - repo: github/awesome-copilot
    # awesome-copilot has hundreds of skills; pull only what we use.
    skills:
      - conventional-commit
      - playwright-generate-test
  - repo: conventional-branch/conventional-branch
    # Teaches valid Conventional Branch names; pairs with commit-check
    # enforcement in dot_claude/hooks/bash-checks/gate-push-convention.js.
    skills:
      - conventional-branch
  - repo: pproenca/dot-skills
    # 154-skill personal collection; pull only what we use.
    skills:
      - zod
  - repo: currents-dev/playwright-best-practices-skill
    skills:
      - playwright-best-practices
  - repo: microsoft/playwright-cli
    skills:
      - playwright-cli
  - repo: blader/humanizer
    skills:
      - humanizer
  - repo: microsoftdocs/agent-skills
    # Azure Repos expert skill; replaces the lost project-vendored azure-repos.
    skills:
      - azure-repos
