# Scoop buckets and packages for run_onchange_before_10-install-scoop.
# Cannot use template syntax here — chezmoidata loads before the template
# engine. Work-only gating happens in the install script.
#
# Why this exists: some work environments restrict executables to a
# whitelisted directory tree. Once dev tools are relocated there,
# scoop becomes the canonical installer for Windows-native binaries
# that can't live in mise. The [scoop.work] section is expected to grow.

[scoop]
# Known scoop buckets (those listed in `scoop bucket known`).
buckets = ["extras", "nerd-fonts"]

# Installed on every Windows dev machine.
# CLI/shell tools (bat, fd, rg, delta, eza, gh, glow, jj, jq, lazygit,
# carapace, fzf, zoxide, neovim) moved to mise — only Windows-specific
# or non-mise-able tools belong here.
# mise itself is bootstrapped via winget portable (see
# windows/run_onchange_before_00-install-mise.ps1.tmpl).
packages = [
  "kanata",
  "Meslo-NF",
  "zed",
]

# URLs for buckets not in scoop's "known" list. Looked up by name when
# the install script adds a bucket; absent entries default to no URL
# (which works for known buckets like extras/nerd-fonts).
[scoop.bucket_urls]
warthurton_scoop-misc = "https://github.com/warthurton/scoop-misc"

# Work-only additions (gated by `{{ if .work }}` in the install script).
# Add restricted-tree-friendly tooling here as you discover the need.
[scoop.work]
buckets = ["warthurton_scoop-misc"]
packages = [
  "zen-browser",
]
# admin_packages install at machine scope and require UAC. Handled
# by run_onchange_before_15-install-scoop-admin, which self-elevates
# only when an entry here is missing.
admin_packages = []
