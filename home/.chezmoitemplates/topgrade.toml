# Include any additional configuration file(s)
# [include] sections are processed in the order you write them
# Files in $CONFIG_DIR/topgrade.d/ are automatically included before this file
[include]
# paths = ["/etc/topgrade.toml"]


[misc]
# Run `sudo -v` to cache credentials at the start of the run
# This avoids a blocking password prompt in the middle of an unattended run
# (default: false)
# pre_sudo = false

# Sudo command to be used
# sudo_command = "sudo"

# Disable specific steps - same options as the command line flag
# oh-my-zsh managed via chezmoi externals (no .git), zinit updates omz plugins
# containers disabled - Docker Desktop not always running
# go disabled - mise handles Go, Homebrew go conflicts with mise paths
disable = ["shell", "containers", "go"]

# Refresh dotfiles first so the rest of the run upgrades against current config.
first = ["chezmoi"]

# Surface skipped steps so silent no-ops are visible.
show_skipped = true

# Notify only on failure at end of run (replaces legacy `skip_notify` below).
notify_end = "on_failure"

# Don't ask what to do after a failed step; auto-retry once before giving up
# (replaces legacy `no_retry` below).
ask_retry = false
auto_retry = 1

# Ignore failures for these steps
# ignore_failures = ["powershell"]

# List of remote machines with Topgrade installed on them
# remote_topgrades = ["toothless", "pi", "parnas"]

# Path to Topgrade executable on remote machines
# remote_topgrade_path = ".cargo/bin/topgrade"

# Arguments to pass to SSH when upgrading remote systems
# ssh_arguments = "-o ConnectTimeout=2"

# Arguments to pass tmux when pulling Repositories
# tmux_arguments = "-S /var/tmux.sock"

# Do not set the terminal title (default: true)
# set_title = true

# Display the time in step titles (default: true)
# display_time = true

# Don't ask for confirmations (no default value)
# assume_yes = true

# Do not ask to retry failed steps (default: false)
# no_retry = true

# Run inside tmux (default: false)
# run_in_tmux = true

# Cleanup temporary or old files (default: false)
# cleanup = true

# Send a notification for every step (default: false)
# notify_each_step = false

# Skip sending a notification at the end of a run (default: false)
# skip_notify = true

# The Bash-it branch to update (default: "stable")
# bashit_branch = "stable"

# Run specific steps - same options as the command line flag
# only = ["system", "emacs"]

# Whether to self update
#
# this will be ignored if the binary is built without self update support
#
# available also via setting the environment variable TOPGRADE_NO_SELF_UPGRADE)
# no_self_update = true

# Extra tracing filter directives
# These are prepended to the `--log-filter` argument
# See: https://docs.rs/tracing-subscriber/latest/tracing_subscriber/filter/struct.EnvFilter.html#directives
# log_filters = ["topgrade::command=debug", "warn"]


# Commands to run before anything
[pre_commands]
# "Emacs Snapshot" = "rm -rf ~/.emacs.d/elpa.bak && cp -rl ~/.emacs.d/elpa ~/.emacs.d/elpa.bak"


# Commands to run after anything
[post_commands]
# "Emacs Snapshot" = "rm -rf ~/.emacs.d/elpa.bak && cp -rl ~/.emacs.d/elpa ~/.emacs.d/elpa.bak"


# Custom commands
[commands]
# "Python Environment" = "~/dev/.env/bin/pip install -i https://pypi.python.org/simple -U --upgrade-strategy eager jupyter"
# "Custom command using interactive shell (unix)" = "-i vim_upgrade"
# Lowercase, space-free names so `--custom-commands <name>` needs no
# quoting or case-matching on the CLI.
#
# agent-skills: chezmoi's run_onchange install-skills script ADDS declared
# skills (fires on skills.yaml change); topgrade owns UPDATING them.
# Invoke via `pnx`, not `npx`: the skills package declares
# devEngines.packageManager = pnpm, so npm trips EBADDEVENGINES on a
# name mismatch. pnx (alias of pnpm dlx) runs it under pnpm and satisfies it.
agent-skills = "pnx skills update -g -y"
# tv-channels: pull the community channel set. Moved out of chezmoi apply
# (was run_before_05-update-tv-channels) so apply stays fast; tv skips
# channels that already exist, chezmoi still owns custom overrides.
tv-channels = "tv update-channels"


[python]
# enable_pip_review = true                         ###disabled by default
# enable_pip_review_local = true                   ###disabled by default
# enable_pipupgrade = true                         ###disabled by default
# pipupgrade_arguments = "-y -u --pip-path pip"    ###disabled by default


[composer]
# self_update = true


[brew]
# For the BrewCask step
# If `Repo Cask Upgrade` exists, then use the `-a` option.
# Otherwise, use the `--greedy` option.
# Greedy: also upgrade casks that auto-update themselves, so Homebrew's
# tracked version stays accurate and a broken self-updater gets caught.
greedy_cask = true

# For the BrewCask step
# If `Repo Cask Upgrade` does not exist, then use the `--greedy_latest` option.
# NOTE: the above entry `greedy_cask` contains this entry, though you can enable
# both of them, they won't clash with each other.
# greedy_latest = true

# For the BrewFormula step
# Execute `brew autoremove` after the step.
# Trim orphaned formula dependencies after upgrade.
autoremove = true

# For the BrewFormula step
# Upgrade formulae built from the HEAD branch; `brew upgrade --fetch-HEAD`
# fetch_head = true


[chezmoi]
# Skip age-encrypted files during chezmoi update
# (default: false)
# exclude_encrypted = false


[mise]
# Bump pinned versions in mise.toml to latest. Entries pinned to "latest"
# (like topgrade itself) are no-ops; specific-version pins get bumped and
# the lockfile is updated so other machines pull the new version.
bump = true

# Number of parallel install jobs (default: 4)
# jobs = 4

# Run interactively (default: false)
# interactive = false

# Suppress non-error messages (default: false)
# quiet = false

# Suppress all task output and mise non-error messages (default: false)
# silent = false

# Show extra output (default: false)
# verbose = false


[cargo]
# Whether `cargo install-update` also updates git-originating packages
# (default: true)
# git = false

# Run `cargo install-update` quietly
# (default: false)
# quiet = true


[linux]
# Arch Package Manager to use.
# Allowed values:
#   autodetect, aura, garuda_update, pacman, pamac, paru, pikaur, trizen, yay
# arch_package_manager = "pacman"

# Arguments to pass yay (or paru) when updating packages
# yay_arguments = "--nodevel"

# Arguments to pass dnf when updating packages
# dnf_arguments = "--refresh"

# aura_aur_arguments = "-kx"

# aura_pacman_arguments = ""
# garuda_update_arguments = ""

# show_arch_news = true

# trizen_arguments = "--devel"

# pikaur_arguments = ""

# pamac_arguments = "--no-devel"

# enable_tlmgr = true

# emerge_sync_flags = "-q"

# emerge_update_flags = "-uDNa --with-bdeps=y world"

# redhat_distro_sync = false

# suse_dup = false

# rpm_ostree = false

# nix_arguments = "--flake"

# nix_env_arguments = "--prebuilt-only"

# Extra Home Manager arguments
# home_manager_arguments = ["--flake", "file"]


[git]
# How many repos to pull at max in parallel
# max_concurrency = 5

# Additional git repositories to pull
# repos = [
#     "~/src/*/",
#     "~/.config/something"
# ]

# Don't pull the predefined git repos
# pull_predefined = false

# Arguments to pass Git when pulling Repositories
# arguments = "--rebase --autostash"


[windows]
# Manually select Windows updates
# accept_all_updates = false

# Controls whether to auto-reboot when updates request it.
# Allowed: "yes", "no", "ask". Default "no".
# "ask" = explicit consent before reboot during a topgrade run.
updates_auto_reboot = "ask"

# open_remotes_in_new_terminal = true

# wsl_update_pre_release = true

# Pull WSL update direct from Microsoft (bypass Microsoft Store).
# Useful in environments where Store is blocked or slow.
wsl_update_use_web_download = true

# Silent winget installs. Default is already `true`; set explicit so the
# behavior is obvious in this file. Set to `false` if you want to see
# winget's interactive UI per package.
# (Field name is `winget_silent_install` in topgrade 17.x; upstream example
# uses `winget_install_silently` which is rejected by the binary.)
winget_silent_install = true

# Causes Topgrade to rename itself during the run to allow package managers
# to upgrade it. Use this only if you installed Topgrade by using a package
# manager such as Scoop or Cargo. Skip for mise/aqua install — mise owns
# the binary path and updates topgrade via the `mise` step instead.
# self_rename = true

# Run winget elevated. Discouraged upstream — some packages break under
# sudo-mode. Leave off unless you hit a specific permission error.
# winget_use_sudo = true


[npm]
# Use sudo if the NPM directory isn't owned by the current user
# use_sudo = true


[yarn]
# Run `yarn global upgrade` with `sudo`
# use_sudo = true


[vim]
# For `vim-plug`, execute `PlugUpdate!` instead of `PlugUpdate`
# force_plug_update = true


[firmware]
# Offer to update firmware; if false just check for and display available updates
# upgrade = true


[vagrant]
# Vagrant directories
# directories = []

# power on vagrant boxes if needed
# power_on = true

# Always suspend vagrant boxes instead of powering off
# always_suspend = true


[flatpak]
# Use sudo for updating the system-wide installation
# use_sudo = true


[distrobox]
# use_root = false

# containers = ["archlinux-latest"]
[containers]
# Specify the containers to ignore while updating (Wildcard supported)
# ignored_containers = ["ghcr.io/rancher-sandbox/rancher-desktop/rdx-proxy:latest", "docker.io*"]

[lensfun]
# If disabled, Topgrade invokes `lensfun‑update‑data` without root priviledge, 
# then the update will be only available to you. Otherwise, `sudo` is required,
# and the update will be installed system-wide, i.e., available to all users.
# (default: false)
# use_sudo = false
