# 1Password SSH agent config — shared across machines via chezmoitemplate
# Order = priority. Top entries offered to servers first.
# Avoid the sshd MaxAuthTries=6 default limit by listing most-used keys first.
#
# Docs: https://www.1password.dev/ssh/agent/config
#
# Vault is selected per-machine via .opVault (set in .chezmoi.toml.tmpl):
#   Personal hosts → "Private"
#   Work hosts     → "Employee"
#   Ephemeral      → "" (no agent config rendered)

{{ if .opVault -}}
# Primary ed25519 SSH key
[[ssh-keys]]
item = "SSH Key"
vault = "{{ .opVault }}"

# RSA fallback (Azure DevOps still doesn't support ed25519)
[[ssh-keys]]
item = "SSH Key - RSA"
vault = "{{ .opVault }}"

# GitHub CLI key
[[ssh-keys]]
item = "GitHub CLI"
vault = "{{ .opVault }}"
{{ else -}}
# .opVault not set — ephemeral machine. No keys exposed via agent.
{{ end -}}
